<div class="container">
  <h1 class="mt-3">Edit category</h1>
  <ng-container *ngIf="category as cat; else notFound">
    <form #form="ngForm" (ngSubmit)="onFormSubmit()">
      <div class="mt-2">
        <div class="mt-3">
          <label for="categoryId">
            Category Id
          </label>
          <input type="text" disabled id="categoryId" class="form-control" name="categoryId" [ngModel]="cat.id">
        </div>
      </div>
      <div class="mt-2">
        <div class="mt-3">
          <label for="categoryName">
            Category Name
          </label>
          <input type="text" id="categoryName" class="form-control" name="categoryName" [(ngModel)]="cat.name">
        </div>
      </div>
      <div class="mt-2">
        <div class="mt-3">
          <label for="categoryUrlHandle">
            Category Url Handle
          </label>
          <input type="text" id="categoryUrlHandle" class="form-control" name="categoryUrlHandle" [(ngModel)]="cat.urlHandle">
        </div>
      </div>
      <div class="mt-3 d-flex">
        <button class="btn btn-primary" type="submit">
          Save
        </button>
        <button class="btn btn-danger ms-2" type="button" (click)="onDelete()">
          Delete
        </button>
      </div>
    </form>
  </ng-container>
  <ng-template #notFound>
    <div class="alert alert-danger mt-3" role="alert">
      Category not found!
    </div>
  </ng-template>
</div>
