<div class="container">
  <h1>BlogPost</h1>

  <div class="d-flex justify-content-end mt-3">
    <a [routerLink]="['/admin/blogposts/add']" class="btn btn-primary">Add BlogPost</a>
  </div>

  <ng-container *ngIf="blogPosts$ | async as blogposts">
    <table class="table table-bordered mt-3">
      <thead>
      <tr>
        <th scope="col">Title</th>
        <th scope="col">Short Description</th>
        <th scope="col">Is Visible?</th>
        <th scope="col">Categories</th>
        <td>Actions</td>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let blogpost of blogposts">
        <td>{{ blogpost.title }}</td>
        <td>{{ blogpost.shortDescription }}</td>
        <td>{{ blogpost.isVisible ? 'Yes' : 'No' }}</td>
        <td>
          <span *ngFor="let category of blogpost.categories">
            <span class="badge text-bg-secondary me-2">{{ category.name }}</span>
          </span>
        </td>
        <td>
          <a class="btn btn-light" [routerLink]="['/admin/blogposts/edit', blogpost.id]">Edit</a>
        </td>
      </tr>
      </tbody>
    </table>
  </ng-container>
</div>
