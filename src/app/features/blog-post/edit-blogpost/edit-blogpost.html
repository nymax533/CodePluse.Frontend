<h1 class="text-center">Edit BlogPost</h1>
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <form #form="ngForm" (ngSubmit)="onFormSubmit()" class="mt-3" style="min-width: 400px;">
    <ng-container *ngIf="model">
    <div class="mb-3">
      <label for="title" class="form-label">Title</label>
      <input type="text" class="form-control" id="title" name="title" [(ngModel)]="model.title">
    </div>
    <div class="mb-3">
      <label for="shortDescription" class="form-label">Short Description</label>
      <input type="text" class="form-control" id="shortDescription" name="shortDescription" [(ngModel)]="model.shortDescription">
    </div>
    <div class="mb-3">
      <label for="urlHandle" class="form-label">Url Handle</label>
      <input type="text" class="form-control" id="urlHandle" name="urlHandle" [(ngModel)]="model.urlHandle">
    </div>
    <div class="mb-3">
      <label for="content" class="form-label">Content</label>
      <textarea
        class="form-control"
        id="content"
        name="content"
        [(ngModel)]="model.content"
        style="height: 350px; max-height: 350px">
              </textarea>
    </div>
    <div class="mb-3">
      <label for="featuredImageUrl" class="form-label">Featured Image URL</label>
      <button type="button" class="btn btn-light btn-sm ms-2" (click)="openImageSelector()" >
        Select Image
      </button>
      <ng-container *ngIf="model.featuredImageUrl">
        <div>
          <img [src]="model.featuredImageUrl" height="100" class="my-2"/>
        </div>
      </ng-container>
      <input
        type="text"
        class="form-control"
        id="featuredImageUrl"
        name="featuredImageUrl"
        [(ngModel)]="model.featuredImageUrl">

    </div>
    <div class="mb-3">
      <label for="publishedDate" class="form-label">Published Date</label>
      <input type="date"
             class="form-control"
             id="publishedDate"
             name="publishedDate"
             [(ngModel)]="model.publishedDate">
    </div>
    <div class="mb-3">
      <label for="author" class="form-label">Author</label>
      <input type="text" class="form-control" id="author" name="author" [(ngModel)]="model.author">
    </div>
    <div class="form-check mt-3">
      <input class="form-check-input" type="checkbox" id="isVisible" name="isVisible" [(ngModel)]="model.isVisible">
      <label class="form-check-label" for="isVisible">
        Is Visible?
      </label>
    </div>

    <div class="mt-3">
      <label for="categories" class="form-label">Categories</label>
      <ng-container *ngIf="categories$ | async as categories">
        <select class="form-control" id="categories" name="categories" multiple [(ngModel)]="selectedCategory">
          <option *ngFor="let category of categories" [ngValue]="category.id">{{ category.name }}</option>
        </select>
      </ng-container>
    </div>
      <div class="mt-3 d-flex">
        <button class="btn btn-primary" type="submit">
          Save
        </button>
        <button class="btn btn-danger ms-2" type="button" (click)="onDelete()" >
          Delete
        </button>
      </div>
    </ng-container>
  </form>
</div>
<div class="images-container-modal" [ngClass]="{'d-block': isImageSelectorVisible, 'd-none': !isImageSelectorVisible }">
  <button type="button" class="btn-close btn-close-white" style="position: fixed; top: 10px; right: 10px; " aria-label="Close" (click)="closeImageSelector()"></button>
  <app-image-selector></app-image-selector>
</div>
